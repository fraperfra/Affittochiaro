            - img [ref=e631]
          - paragraph [ref=e633]: Il nostro team di supporto è disponibile 7 giorni su 7. Puoi contattarci tramite la chat in basso a destra, via email a supporto@affittochiaro.it o chiamando il numero verde. Rispondiamo sempre entro 2 ore lavorative.
