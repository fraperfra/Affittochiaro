        - generic [ref=e570]:
          - button "Come funziona Affittochiaro?" [ref=e571] [cursor=pointer]:
            - generic [ref=e572]: Come funziona Affittochiaro?
            - img [ref=e574]
          - paragraph [ref=e577]: "Affittochiaro ti permette di creare un profilo inquilino verificato con tutte le informazioni che i proprietari cercano: documenti, referenze, video presentazione e storico affitti. Quando ti candidi per un annuncio, il proprietario riceve il tuo profilo completo e può risponderti in meno di 24 ore."
        - generic [ref=e578]:
          - button "Quanto costa creare un profilo?" [ref=e579] [cursor=pointer]:
            - generic [ref=e580]: Quanto costa creare un profilo?
            - img [ref=e582]
          - paragraph [ref=e584]: Creare il tuo profilo inquilino è completamente gratuito. Puoi aggiungere tutte le informazioni, caricare documenti e candidarti agli annunci senza alcun costo. Offriamo anche piani premium per chi vuole maggiore visibilità e funzionalità avanzate.
        - generic [ref=e585]:
          - button "Come viene verificato il mio profilo?" [ref=e586] [cursor=pointer]:
            - generic [ref=e587]: Come viene verificato il mio profilo?
            - img [ref=e589]
          - paragraph [ref=e591]: Verifichiamo la tua identità tramite documento, il tuo reddito attraverso documentazione ufficiale (busta paga, CUD, dichiarazione dei redditi) e le referenze dai precedenti proprietari. Un profilo verificato aumenta le tue possibilità di essere contattato del 300%.
        - generic [ref=e592]:
          - button "Posso candidarmi a più annunci contemporaneamente?" [ref=e593] [cursor=pointer]:
            - generic [ref=e594]: Posso candidarmi a più annunci contemporaneamente?
            - img [ref=e596]
          - paragraph [ref=e598]: Certamente! Con Affittochiaro puoi candidarti a tutti gli annunci che desideri. Il tuo profilo viene inviato automaticamente ai proprietari, risparmiandoti ore di email e telefonate.
        - generic [ref=e599]:
          - button "Quanto tempo ci vuole per trovare casa?" [ref=e600] [cursor=pointer]:
            - generic [ref=e601]: Quanto tempo ci vuole per trovare casa?
            - img [ref=e603]
          - paragraph [ref=e605]: In media, i nostri utenti trovano casa in meno di 2 settimane. Grazie al profilo verificato e completo, i proprietari rispondono più velocemente e con maggiore fiducia. Il 78% degli utenti riceve almeno una risposta entro 48 ore.
        - generic [ref=e606]:
          - button "Cos'è la video presentazione?" [ref=e607] [cursor=pointer]:
            - generic [ref=e608]: Cos'è la video presentazione?
            - img [ref=e610]
          - paragraph [ref=e612]: La video presentazione è un breve video (30-60 secondi) in cui ti presenti ai proprietari. È un modo efficace per distinguerti dagli altri candidati e mostrare la tua affidabilità. I profili con video ricevono il 40% di risposte in più.
        - generic [ref=e613]:
          - button "I miei dati sono al sicuro?" [ref=e614] [cursor=pointer]:
            - generic [ref=e615]: I miei dati sono al sicuro?
            - img [ref=e617]
          - paragraph [ref=e619]: Assolutamente sì. Utilizziamo crittografia di livello bancario per proteggere tutti i tuoi dati. Le informazioni sensibili vengono condivise solo con i proprietari degli annunci a cui ti candidi e solo dopo il tuo consenso esplicito.
        - generic [ref=e620]:
          - button "Posso usare Affittochiaro in tutta Italia?" [ref=e621] [cursor=pointer]:
            - generic [ref=e622]: Posso usare Affittochiaro in tutta Italia?
            - img [ref=e624]
          - paragraph [ref=e626]: "Sì! Affittochiaro è attivo in tutte le principali città italiane: Milano, Roma, Torino, Bologna, Firenze, Napoli e molte altre. La nostra community cresce ogni giorno con nuovi annunci e inquilini verificati."
        - generic [ref=e627]:
          - button "Come posso contattare l'assistenza?" [ref=e628] [cursor=pointer]:
